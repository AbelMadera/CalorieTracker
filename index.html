    // ═══════════════════════════════════════════════════════════════
    // Diary
    // ═══════════════════════════════════════════════════════════════
    function Diary({ entriesByDate, waterByDate, selectedDate, setSelectedDate, setWater, onOpenFood }) {
      const todayKey = dateKey();
      const selected = parseDateKey(selectedDate);

      // Anchor the visible week to the *selected* date's Monday.
      const selectedDow = (selected.getDay() + 6) % 7;
      const weekStart = addDays(selected, -selectedDow);
      const week = Array.from({ length: 7 }, (_, i) => addDays(weekStart, i));
      const weekKeys = week.map(dateKey);

      const dayLetters = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];

      const entriesFor = (key) => entriesByDate[key] || [];
      const totalsFor = (key) => entriesFor(key).reduce((a, e) => ({
        cal: a.cal + e.cal * e.qty, p: a.p + e.p * e.qty, c: a.c + e.c * e.qty, f: a.f + e.f * e.qty,
      }), { cal: 0, p: 0, c: 0, f: 0 });

      const cals = weekKeys.map(k => Math.round(totalsFor(k).cal));
      const totals = totalsFor(selectedDate);
      const water = waterByDate[selectedDate] ?? 0;

      const fmtMonthDay = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase();
      const rangeLabel = `${fmtMonthDay(week[0])} — ${fmtMonthDay(week[6])}`;

      const meals = ['Breakfast', 'Lunch', 'Dinner', 'Snacks'];
      const dayEntries = entriesFor(selectedDate);
      const mealData = meals.map(m => {
        const items = dayEntries.filter(e => e.meal === m);
        const cal = items.reduce((s, e) => s + e.cal * e.qty, 0);
        return { meal: m, items, cal };
      });

      const goPrevWeek = () => setSelectedDate(dateKey(addDays(weekStart, -7)));
      const goNextWeek = () => setSelectedDate(dateKey(addDays(weekStart, 7)));
      // Don't let users navigate into the future
      const nextWeekStart = addDays(weekStart, 7);
      const canGoNext = nextWeekStart <= new Date();

      return (
        <div style={{ padding: '8px 20px 120px' }}>
          <div style={{ marginBottom: 14, display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
            <div>
              <div style={{ fontSize: 11, color: T.mute, fontWeight: 600, letterSpacing: 0.6 }}>{rangeLabel}</div>
              <div style={{ fontSize: 26, fontWeight: 700, color: T.ink, letterSpacing: -0.6, marginTop: 2 }}>Diary</div>
            </div>
            <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
              {selectedDate !== todayKey && (
                <button onClick={() => setSelectedDate(todayKey)} style={{
                  height: 32, padding: '0 12px', borderRadius: 16,
                  background: T.ink, border: 'none', color: '#fff',
                  fontSize: 12, fontWeight: 600, cursor: 'pointer',
                  fontFamily: 'inherit',
                }}>Today</button>
              )}
              <button onClick={goPrevWeek} aria-label="Previous week" style={{
                width: 32, height: 32, borderRadius: 16, background: T.card,
                border: `1px solid ${T.hair}`, display: 'flex', alignItems: 'center', justifyContent: 'center',
                cursor: 'pointer', color: T.ink2,
              }}>{Ic.back(16)}</button>
              <button onClick={goNextWeek} disabled={!canGoNext} aria-label="Next week" style={{
                width: 32, height: 32, borderRadius: 16, background: T.card,
                border: `1px solid ${T.hair}`, display: 'flex', alignItems: 'center', justifyContent: 'center',
                cursor: canGoNext ? 'pointer' : 'not-allowed',
                opacity: canGoNext ? 1 : 0.4, color: T.ink2,
              }}>{Ic.chevR(16)}</button>
            </div>
          </div>

          <div style={{
            background: T.card, borderRadius: 18, padding: '12px 8px',
            border: `1px solid ${T.hair}`, marginBottom: 16,
            display: 'flex', justifyContent: 'space-between',
          }}>
            {week.map((d, i) => {
              const k = weekKeys[i];
              const active = k === selectedDate;
              const isToday = k === todayKey;
              const isFuture = d > new Date();
              const cal = cals[i];
              const ratio = cal === 0 ? 0 : Math.min(1, cal / GOAL.cal);
              return (
                <button key={k} onClick={() => !isFuture && setSelectedDate(k)} disabled={isFuture} style={{
                  flex: 1, padding: '6px 4px', background: active ? T.ink : 'none', border: 'none',
                  borderRadius: 12, cursor: isFuture ? 'not-allowed' : 'pointer',
                  display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
                  color: active ? '#fff' : T.ink, opacity: isFuture ? 0.35 : 1,
                }}>
                  <div style={{ fontSize: 10, fontWeight: 600, opacity: active ? 0.7 : 0.5 }}>{dayLetters[i]}</div>
                  <div style={{ fontSize: 16, fontWeight: 700, fontVariantNumeric: 'tabular-nums' }}>{d.getDate()}</div>
                  {cal === 0 ? (
                    <div style={{ width: 4, height: 4, borderRadius: 2, background: active ? 'rgba(255,255,255,0.4)' : T.hair2 }} />
                  ) : (
                    <div style={{
                      width: 22, height: 3, borderRadius: 2,
                      background: active ? 'rgba(255,255,255,0.3)' : T.hair, position: 'relative', overflow: 'hidden',
                    }}>
                      <div style={{
                        width: `${ratio * 100}%`, height: '100%',
                        background: active ? '#fff' : T.cal,
                      }} />
                    </div>
                  )}
                  {isToday && !active && (
                    <div style={{ fontSize: 8, color: T.accent, fontWeight: 700, letterSpacing: 0.5, marginTop: -2 }}>TODAY</div>
                  )}
                </button>
              );
            })}
          </div>

          <div style={{
            background: T.card, borderRadius: 18, padding: '16px 18px',
            border: `1px solid ${T.hair}`, marginBottom: 16,
          }}>
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 11, color: T.mute, fontWeight: 600, letterSpacing: 0.6 }}>CALORIES</div>
              <div style={{ display: 'flex', alignItems: 'baseline', gap: 6, marginTop: 2 }}>
                <span style={{ fontSize: 28, fontWeight: 700, color: T.ink, letterSpacing: -0.8, fontVariantNumeric: 'tabular-nums' }}>
                  {num(Math.round(totals.cal))}
                </span>
                <span style={{ fontSize: 13, color: T.mute }}>/ {num(GOAL.cal)}</span>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 12, marginBottom: 16 }}>
              <MacroBar label="Protein" val={totals.p} goal={GOAL.p} color={T.protein} />
              <MacroBar label="Carbs" val={totals.c} goal={GOAL.c} color={T.carbs} />
              <MacroBar label="Fat" val={totals.f} goal={GOAL.f} color={T.fat} />
            </div>
            <div style={{ height: 1, background: T.hair, marginBottom: 14 }} />
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                {Ic.drop(16, T.water)}
                <span style={{ fontSize: 11, color: T.mute, fontWeight: 600, letterSpacing: 0.6 }}>WATER</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'baseline', gap: 4, fontVariantNumeric: 'tabular-nums' }}>
                <span style={{ fontSize: 14, fontWeight: 700, color: T.ink }}>{water}</span>
                <span style={{ fontSize: 11, color: T.mute }}>/ {GOAL.water} cups</span>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
              <button onClick={() => setWater(Math.max(0, water - 1))} aria-label="Remove water" style={{
                width: 26, height: 30, borderRadius: 7, background: T.bg, border: `1px solid ${T.hair2}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
                color: T.ink2, flexShrink: 0,
              }}>{Ic.minus(14)}</button>
              <div style={{ flex: 1, display: 'flex', gap: 3 }}>
                {Array.from({ length: GOAL.water }).map((_, i) => {
                  const filled = i < water;
                  return (
                    <button key={i} onClick={() => setWater(i + 1 === water ? i : i + 1)} aria-label={`Set water to ${i + 1} cup${i ? 's' : ''}`} style={{
                      flex: 1, height: 30, borderRadius: 5, padding: 0, border: 'none',
                      background: filled ? T.water : 'transparent',
                      boxShadow: filled ? 'none' : `inset 0 0 0 1.5px ${T.hair2}`,
                      cursor: 'pointer', transition: 'background 250ms',
                    }} />
                  );
                })}
              </div>
              <button onClick={() => setWater(Math.min(GOAL.water + 4, water + 1))} aria-label="Add water" style={{
                width: 26, height: 30, borderRadius: 7, background: T.ink, border: 'none',
                display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
                color: '#fff', flexShrink: 0,
              }}>{Ic.plus(14)}</button>
            </div>
          </div>

          <div style={{ fontSize: 13, fontWeight: 600, color: T.mute, marginBottom: 8, letterSpacing: 0.3 }}>TIMELINE</div>
          <div style={{ position: 'relative', paddingLeft: 0 }}>
            {mealData.map(({ meal, items, cal }, mi) => (
              <div key={meal} style={{ display: 'flex', gap: 12, paddingBottom: 16 }}>
                <div style={{ width: 56, flexShrink: 0, paddingTop: 14 }}>
                  <div style={{ fontSize: 11, color: T.mute, fontWeight: 600, letterSpacing: 0.3, fontVariantNumeric: 'tabular-nums' }}>
                    {items.length > 0 ? ['Morning', 'Midday', 'Evening', 'Anytime'][mi] : '—'}
                  </div>
                </div>
                <div style={{ position: 'relative', width: 12, flexShrink: 0 }}>
                  <div style={{
                    position: 'absolute', top: 18, bottom: -8, left: 5, width: 2,
                    background: T.hair, display: mi === 3 ? 'none' : 'block',
                  }} />
                  <div style={{
                    position: 'absolute', top: 18, left: 0, width: 12, height: 12, borderRadius: 6,
                    background: items.length > 0 ? T.ink : T.card,
                    border: `2px solid ${items.length > 0 ? T.ink : T.hair2}`,
                  }} />
                </div>
                <div style={{
                  flex: 1, background: T.card, borderRadius: 14, padding: '12px 14px',
                  border: `1px solid ${T.hair}`,
                }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: items.length > 0 ? 8 : 0 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: T.ink }}>{meal}</div>
                    <div style={{ fontSize: 12, fontWeight: 600, color: items.length > 0 ? T.ink : T.mute, fontVariantNumeric: 'tabular-nums' }}>
                      {items.length > 0 ? `${Math.round(cal)} kcal` : 'Not logged'}
                    </div>
                  </div>
                  {items.map((it, i) => (
                    <button key={it.uid} onClick={() => onOpenFood(it)} style={{
                      width: '100%', padding: '6px 0', background: 'none', border: 'none',
                      borderTop: i > 0 ? `1px dashed ${T.hair}` : `1px solid ${T.hair}`,
                      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                      cursor: 'pointer', textAlign: 'left',
                    }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 12.5, color: T.ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{it.name}</div>
                        <div style={{ fontSize: 10.5, color: T.mute, marginTop: 1 }}>{it.qty}× · {(it.p * it.qty).toFixed(0)}g protein</div>
                      </div>
                      <div style={{ fontSize: 12, fontWeight: 600, color: T.ink2, fontVariantNumeric: 'tabular-nums' }}>
                        {Math.round(it.cal * it.qty)}
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // Stats
    // ═══════════════════════════════════════════════════════════════
    function Stats({ entriesByDate, waterByDate }) {
      const [range, setRange] = useState('week');
      const today = new Date();
      const todayDow = (today.getDay() + 6) % 7; // Mon=0 ... Sun=6

      const dayLabels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

      // For "week": Mon..Sun of the current week
      // For "month": last 28 days ending today
      const days = (() => {
        if (range === 'week') {
          const monday = addDays(today, -todayDow);
          return Array.from({ length: 7 }, (_, i) => addDays(monday, i));
        }
        return Array.from({ length: 28 }, (_, i) => addDays(today, -(27 - i)));
      })();
      const dayKeys = days.map(dateKey);
      const todayKey = dateKey(today);
      const todayIdxInRange = dayKeys.indexOf(todayKey);

      const totalsFor = (key) => (entriesByDate[key] || []).reduce((a, e) => ({
        cal: a.cal + e.cal * e.qty, p: a.p + e.p * e.qty, c: a.c + e.c * e.qty, f: a.f + e.f * e.qty,
      }), { cal: 0, p: 0, c: 0, f: 0 });

      // Don't include future days as "missing data" — clamp at today
      const isPastOrToday = days.map(d => d <= today);
      const dayTotals = dayKeys.map((k, i) => isPastOrToday[i] ? totalsFor(k) : null);
      const data = dayTotals.map(t => t ? Math.round(t.cal) : 0);

      const loggedTotals = dayTotals.filter(t => t && t.cal > 0);
      const loggedCount = loggedTotals.length;
      const hasData = loggedCount > 0;

      const avg = loggedCount ? Math.round(loggedTotals.reduce((s, t) => s + t.cal, 0) / loggedCount) : 0;
      const max = Math.max(...data, GOAL.cal);

      // Goal hits = logged days within ±10% of calorie goal
      const goalHits = loggedTotals.filter(t => t.cal >= GOAL.cal * 0.9 && t.cal <= GOAL.cal * 1.1).length;
      const totalDays = days.length;

      // Streak: consecutive days ending today (or yesterday if today is empty) with logged entries
      const streak = (() => {
        let s = 0;
        // Walk backwards from today through every available date in storage (not just the visible range)
        let cursor = new Date(today);
        // If today has no entries, allow streak to continue from yesterday so an empty morning doesn't break it
        let allowSkipToday = true;
        while (true) {
          const k = dateKey(cursor);
          const t = totalsFor(k);
          if (t.cal > 0) {
            s += 1;
            allowSkipToday = false;
          } else {
            if (allowSkipToday && dateKey(cursor) === todayKey) {
              allowSkipToday = false;
            } else {
              break;
            }
          }
          cursor = addDays(cursor, -1);
          // Safety: don't loop more than a year
          if (s > 365) break;
        }
        return s;
      })();

      // Avg protein across logged days
      const avgProtein = loggedCount ? Math.round(loggedTotals.reduce((s, t) => s + t.p, 0) / loggedCount) : 0;

      // Avg water across days that have a water value > 0 in the visible range
      const waterValues = dayKeys
        .filter((_, i) => isPastOrToday[i])
        .map(k => waterByDate?.[k] ?? 0);
      const waterLoggedCount = waterValues.filter(v => v > 0).length;
      const avgWater = waterLoggedCount
        ? +(waterValues.filter(v => v > 0).reduce((a, b) => a + b, 0) / waterLoggedCount).toFixed(1)
        : 0;

      // Avg macro split across logged days (calorie-weighted)
      const sumP = loggedTotals.reduce((s, t) => s + t.p, 0);
      const sumC = loggedTotals.reduce((s, t) => s + t.c, 0);
      const sumF = loggedTotals.reduce((s, t) => s + t.f, 0);
      const pCal = sumP * 4, cCal = sumC * 4, fCal = sumF * 9;
      const macroSum = pCal + cCal + fCal;
      const pPct = macroSum ? Math.round((pCal / macroSum) * 100) : 0;
      const cPct = macroSum ? Math.round((cCal / macroSum) * 100) : 0;
      const fPct = macroSum ? 100 - pPct - cPct : 0;

      return (
        <div style={{ padding: '8px 20px 120px' }}>
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: T.mute, fontWeight: 600, letterSpacing: 0.6 }}>YOUR PROGRESS</div>
            <div style={{ fontSize: 26, fontWeight: 700, color: T.ink, letterSpacing: -0.6, marginTop: 2 }}>Stats</div>
          </div>

          <div style={{
            display: 'flex', background: T.card, borderRadius: 12, padding: 3,
            border: `1px solid ${T.hair}`, marginBottom: 16,
          }}>
            {['week', 'month'].map(r => (
              <button key={r} onClick={() => setRange(r)} style={{
                flex: 1, padding: '8px', background: range === r ? T.ink : 'transparent',
                color: range === r ? '#fff' : T.ink2, fontWeight: 600, fontSize: 13,
                border: 'none', borderRadius: 9, cursor: 'pointer', textTransform: 'capitalize',
              }}>{r === 'week' ? 'This week' : 'Last 28 days'}</button>
            ))}
          </div>

          <div style={{
            background: T.card, borderRadius: 20, padding: '18px', border: `1px solid ${T.hair}`, marginBottom: 12,
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 4 }}>
              <div>
                <div style={{ fontSize: 11, color: T.mute, fontWeight: 600, letterSpacing: 0.6 }}>AVG CALORIES / LOGGED DAY</div>
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginTop: 4 }}>
                  <span style={{ fontSize: 30, fontWeight: 700, color: T.ink, letterSpacing: -0.8, fontVariantNumeric: 'tabular-nums' }}>
                    {hasData ? num(avg) : '—'}
                  </span>
                  {hasData && (
                    <span style={{ fontSize: 13, color: avg < GOAL.cal ? T.good : T.warn, fontWeight: 600 }}>
                      {avg < GOAL.cal ? `${num(GOAL.cal - avg)} under goal` : `${num(avg - GOAL.cal)} over`}
                    </span>
                  )}
                </div>
              </div>
            </div>

            <div style={{ position: 'relative', height: 140, marginTop: 18 }}>
              <div style={{
                position: 'absolute', left: 0, right: 0, bottom: `${(GOAL.cal / max) * 100}%`,
                borderTop: `1px dashed ${T.hair2}`,
              }}>
                <div style={{
                  position: 'absolute', right: 0, top: -8, fontSize: 9, color: T.mute, fontWeight: 600,
                  background: T.card, padding: '0 4px',
                }}>GOAL {num(GOAL.cal)}</div>
              </div>

              <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'flex-end', gap: range === 'week' ? 8 : 2 }}>
                {data.map((v, i) => {
                  const h = (v / max) * 100;
                  const over = v > GOAL.cal;
                  const isToday = i === todayIdxInRange;
                  return (
                    <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, height: '100%', justifyContent: 'flex-end' }}>
                      <div style={{
                        width: '100%', height: `${h}%`, borderRadius: range === 'week' ? 4 : 2,
                        background: over ? T.warn : (isToday ? T.ink : T.cal),
                        opacity: isToday ? 1 : (over ? 0.7 : 0.85),
                        transition: 'height 400ms',
                      }} />
                      {range === 'week' && (
                        <div style={{ fontSize: 10, color: isToday ? T.ink : T.mute, fontWeight: isToday ? 700 : 500 }}>{dayLabels[i]}</div>
                      )}
                    </div>
                  );
                })}
              </div>
              {!hasData && (
                <div style={{
                  position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 12, color: T.mute, fontWeight: 500,
                }}>No data logged yet</div>
              )}
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 12 }}>
            <KPI label="Streak" value={String(streak)} unit={streak === 1 ? 'day' : 'days'} color={T.accent} />
            <KPI label="Goal hits" value={String(goalHits)} unit={`of ${totalDays}`} color={T.good} />
            <KPI label="Avg protein" value={hasData ? String(avgProtein) : '—'} unit="g" color={T.protein} />
            <KPI label="Avg water" value={waterLoggedCount ? String(avgWater) : '—'} unit="cups" color={T.water} />
          </div>

          <div style={{
            background: T.card, borderRadius: 20, padding: '18px', border: `1px solid ${T.hair}`,
          }}>
            <div style={{ fontSize: 11, color: T.mute, fontWeight: 600, letterSpacing: 0.6, marginBottom: 12 }}>AVG MACRO SPLIT</div>
            {macroSum > 0 ? (
              <Fragment>
                <div style={{ display: 'flex', height: 14, borderRadius: 7, overflow: 'hidden', marginBottom: 12 }}>
                  <div style={{ flex: pPct || 0.001, background: T.protein }} />
                  <div style={{ flex: cPct || 0.001, background: T.carbs }} />
                  <div style={{ flex: fPct || 0.001, background: T.fat }} />
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                  {[
                    { l: 'Protein', v: `${pPct}%`, c: T.protein, g: `${Math.round(sumP / loggedCount)}g` },
                    { l: 'Carbs', v: `${cPct}%`, c: T.carbs, g: `${Math.round(sumC / loggedCount)}g` },
                    { l: 'Fat', v: `${fPct}%`, c: T.fat, g: `${Math.round(sumF / loggedCount)}g` },
                  ].map(m => (
                    <div key={m.l} style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                        <div style={{ width: 6, height: 6, borderRadius: 3, background: m.c }} />
                        <span style={{ fontSize: 11, color: T.mute, fontWeight: 500 }}>{m.l}</span>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
                        <span style={{ fontSize: 18, fontWeight: 700, color: T.ink, fontVariantNumeric: 'tabular-nums', letterSpacing: -0.3 }}>{m.v}</span>
                        <span style={{ fontSize: 10, color: T.mute }}>{m.g}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </Fragment>
            ) : (
              <div style={{ fontSize: 12, color: T.mute, padding: '8px 0' }}>Log a meal to see your macro split.</div>
            )}
          </div>
        </div>
      );
    }

    function KPI({ label, value, unit, color }) {
      return (
        <div style={{
          background: T.card, borderRadius: 16, padding: '14px 16px', border: `1px solid ${T.hair}`,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 6 }}>
            <div style={{ width: 6, height: 6, borderRadius: 3, background: color }} />
            <span style={{ fontSize: 10.5, color: T.mute, fontWeight: 600, letterSpacing: 0.5, textTransform: 'uppercase' }}>{label}</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
            <span style={{ fontSize: 22, fontWeight: 700, color: T.ink, fontVariantNumeric: 'tabular-nums', letterSpacing: -0.5 }}>{value}</span>
            <span style={{ fontSize: 11, color: T.mute }}>{unit}</span>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // Profile
    // ═══════════════════════════════════════════════════════════════
    function Profile({ onResetData }) {

            <div style={{ fontSize: 26, fontWeight: 700, color: T.ink, letterSpacing: -0.6, marginTop: 2 }}>You</div>
          </div>

          <div style={{
            background: T.card, borderRadius: 20, padding: '18px', border: `1px solid ${T.hair}`, marginBottom: 14,
            display: 'flex', alignItems: 'center', gap: 14,
          }}>
            <div style={{
              width: 56, height: 56, borderRadius: 28, background: T.ink,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 22, fontWeight: 700, color: '#fff',
            }}>A</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 17, fontWeight: 700, color: T.ink, letterSpacing: -0.3 }}>Abel Madera</div>
              <div style={{ fontSize: 12, color: T.mute, marginTop: 2 }}>Member since Jan 2025 · 11-day streak 🔥</div>
            </div>
            <button style={{
              width: 32, height: 32, borderRadius: 16, background: T.bg, border: `1px solid ${T.hair2}`,
              display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
            }}>{Ic.chevR(16, T.mute)}</button>
          </div>

          <div style={{
            background: T.card, borderRadius: 20, padding: '18px', border: `1px solid ${T.hair}`, marginBottom: 14,
          }}>
            <div style={{ fontSize: 11, color: T.mute, fontWeight: 600, letterSpacing: 0.6, marginBottom: 12 }}>YOUR STATS</div>
            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
              <PStat label="Weight" value={unit === 'imperial' ? '172' : '78'} unit={unit === 'imperial' ? 'lb' : 'kg'} trend="-2.1" />
              <div style={{ width: 1, background: T.hair }} />
              <PStat label="Height" value={unit === 'imperial' ? '5′10″' : '178'} unit={unit === 'imperial' ? '' : 'cm'} />
              <div style={{ width: 1, background: T.hair }} />

          <Section title="Daily Targets">

                  <button key={u} onClick={() => setUnit(u)} style={{
                    padding: '5px 10px', background: unit === u ? T.ink : 'transparent',
                    color: unit === u ? '#fff' : T.ink2, fontSize: 11, fontWeight: 600,
                    border: 'none', borderRadius: 6, cursor: 'pointer', textTransform: 'capitalize',
                  }}>{u}</button>

              </div>

            <Row label="Reminders" value="3 daily" />

          <div style={{ textAlign: 'center', marginTop: 20, fontSize: 10, color: T.mute, letterSpacing: 0.4 }}>
            MACRO · v2.4.1
          </div>
        </div>
      );
    }

    function PStat({ label, value, unit, trend, trendColor }) {
      return (
        <div style={{ flex: 1, textAlign: 'center' }}>

    function Section({ title, children }) {
      return (
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: T.mute, fontWeight: 600, letterSpacing: 0.6, padding: '0 4px 8px' }}>{title.toUpperCase()}</div>
          <div style={{ background: T.card, borderRadius: 16, border: `1px solid ${T.hair}`, overflow: 'hidden' }}>
            {children}
          </div>

      );
    }

    function Row({ label, value, children, labelColor, valueColor, onClick }) {
      return (
        <div onClick={onClick} style={{
          padding: '13px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          borderTop: `1px solid ${T.hair}`,
          cursor: 'pointer',
        }}>
          <span style={{ fontSize: 14, color: labelColor || T.ink, fontWeight: 500 }}>{label}</span>
          {children || (
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>

    // ═══════════════════════════════════════════════════════════════
    // Toast
    // ═══════════════════════════════════════════════════════════════
    function Toast({ msg }) {
      if (!msg) return null;
      return (
        <div style={{
          position: 'absolute', bottom: 100, left: '50%', transform: 'translateX(-50%)',
          background: T.ink, color: '#fff', padding: '10px 18px', borderRadius: 999,
          fontSize: 13, fontWeight: 500, zIndex: 200,
          display: 'flex', alignItems: 'center', gap: 6,
          animation: 'toastIn 200ms ease-out',
          boxShadow: '0 8px 24px rgba(0,0,0,0.25)',

    // ═══════════════════════════════════════════════════════════════
    // App shell
    // ═══════════════════════════════════════════════════════════════
    const STORAGE_KEY = 'macro-app-v2';
    const LEGACY_KEY = 'macro-app-v1';
    const DEFAULT_TODAY_ENTRIES = [
      { ...FOOD_DB[0], qty: 1, meal: 'Breakfast', uid: 'e1' },
      { ...FOOD_DB[1], qty: 1, meal: 'Breakfast', uid: 'e2' },
      { ...FOOD_DB[2], qty: 1, meal: 'Breakfast', uid: 'e3' },
      { ...FOOD_DB[8], qty: 1, meal: 'Breakfast', uid: 'e4' },
      { ...FOOD_DB[7], qty: 1, meal: 'Lunch', uid: 'e5' },
      { ...FOOD_DB[4], qty: 1, meal: 'Lunch', uid: 'e6' },
      { ...FOOD_DB[9], qty: 1, meal: 'Lunch', uid: 'e7' },
      { ...FOOD_DB[6], qty: 1, meal: 'Lunch', uid: 'e8' },
    ];

    // Date helpers — work in local time so "today" matches the device clock.
    const dateKey = (d = new Date()) => {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    };
    const parseDateKey = (k) => {
      const [y, m, d] = k.split('-').map(Number);
      return new Date(y, m - 1, d);
    };
    const addDays = (d, n) => {
      const r = new Date(d);
      r.setDate(r.getDate() + n);
      return r;
    };

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
        // Migrate from v1 if present (treat the old flat entries/water as today's bucket).
        const legacy = localStorage.getItem(LEGACY_KEY);
        if (legacy) {
          const old = JSON.parse(legacy);
          const todayKey = dateKey();
          return {
            entriesByDate: { [todayKey]: old.entries || DEFAULT_TODAY_ENTRIES },
            waterByDate: { [todayKey]: old.water ?? 5 },
            customFoods: old.customFoods || [],
            favorites: old.favorites || DEFAULT_FAVORITE_IDS,
            uidCounter: old.uidCounter || 100,
            customFoodCounter: old.customFoodCounter || 1,
          };
        }
        return null;
      } catch { return null; }
    }

    function saveState(s) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
    }

    function App() {
      const saved = loadState();
      const todayKey = dateKey();

      const [tab, setTab] = useState('home');
      const [addingMeal, setAddingMeal] = useState(null);
      const [scanning, setScanning] = useState(false);
      const [foodDetail, setFoodDetail] = useState(null);

      // Date-keyed history. Seed today's bucket with defaults on first run.
      const [entriesByDate, setEntriesByDate] = useState(
        saved?.entriesByDate || { [todayKey]: DEFAULT_TODAY_ENTRIES }
      );
      const [waterByDate, setWaterByDate] = useState(
        saved?.waterByDate || { [todayKey]: 5 }
      );
      const [selectedDate, setSelectedDate] = useState(todayKey);

      const [customFoods, setCustomFoods] = useState(saved?.customFoods || []);
      const [favorites, setFavorites] = useState(new Set(saved?.favorites || DEFAULT_FAVORITE_IDS));
      const [toast, setToast] = useState(null);
      const uidRef = useRef(saved?.uidCounter || 100);
      const customFoodRef = useRef(saved?.customFoodCounter || ((saved?.customFoods?.length || 0) + 1));
      const foods = useMemo(() => [...FOOD_DB, ...customFoods], [customFoods]);

      // Entries/water for the currently selected date
      const entries = entriesByDate[selectedDate] || [];
      const water = waterByDate[selectedDate] ?? 0;

      // Setters scoped to the selected date
      const setEntries = (updater) => {
        setEntriesByDate(prev => {
          const cur = prev[selectedDate] || [];
          const next = typeof updater === 'function' ? updater(cur) : updater;
          return { ...prev, [selectedDate]: next };
        });
      };
      const setWater = (val) => {
        setWaterByDate(prev => {
          const cur = prev[selectedDate] ?? 0;
          const next = typeof val === 'function' ? val(cur) : val;
          return { ...prev, [selectedDate]: next };
        });
      };

      // Persist
      useEffect(() => {
        saveState({
          entriesByDate, waterByDate, customFoods,
          favorites: Array.from(favorites),
          uidCounter: uidRef.current, customFoodCounter: customFoodRef.current,
        });
      }, [entriesByDate, waterByDate, customFoods, favorites]);

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 1800);
      };

      const openAdd = (meal = 'Breakfast') => setAddingMeal(meal);

      const handlePickFood = (food) => {
        setFoodDetail({ food, meal: addingMeal, qty: 1 });
        setAddingMeal(null);
      };

      const handleCreateCustomFood = ({ food, qty, meal, favorite }) => {
        const nextFood = { ...food, id: 'custom-' + customFoodRef.current };
        customFoodRef.current += 1;
        uidRef.current += 1;
        const newUid = 'u' + uidRef.current;
        setCustomFoods(prev => [nextFood, ...prev]);
        if (favorite) setFavorites(prev => new Set([...prev, nextFood.id]));
        setEntries(prev => [...prev, { ...nextFood, qty, meal, uid: newUid }]);
        setAddingMeal(null);
        showToast(`Added ${nextFood.name}`);
      };

      const handleLog = (entry) => {
        const isUpdate = entry.uid && entries.some(e => e.uid === entry.uid);
        let newUid = entry.uid;
        if (!isUpdate) {
          uidRef.current += 1;
          newUid = 'u' + uidRef.current;
        }
        setEntries(prev => {
          if (entry.uid && prev.some(e => e.uid === entry.uid)) {
            return prev.map(e => e.uid === entry.uid ? entry : e);
          }
          return [...prev, { ...entry, uid: newUid }];
        });
        setFoodDetail(null);
        setScanning(false);
        showToast(isUpdate ? 'Item updated' : `Added to ${entry.meal}`);
      };

      const handleRemoveEntry = (uid) => {
        setEntries(prev => prev.filter(e => e.uid !== uid));
        setFoodDetail(null);
        showToast('Item removed');
      };

      const handleToggleFav = (id) => {
        setFavorites(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id); else next.add(id);
          return next;
        });
      };

      const handleResetData = () => {
        if (confirm('Reset all data to defaults? This cannot be undone.')) {
          const k = dateKey();
          setEntriesByDate({ [k]: DEFAULT_TODAY_ENTRIES });
          setWaterByDate({ [k]: 5 });
          setSelectedDate(k);
          setCustomFoods([]);
          setFavorites(new Set(DEFAULT_FAVORITE_IDS));
          uidRef.current = 100;
          customFoodRef.current = 1;
          showToast('Data reset');
        }
      };

      let main;
      if (tab === 'home') main = <Dashboard entries={entries} water={water} setWater={setWater}
                                            onOpenFood={(it) => setFoodDetail({ food: it, meal: it.meal, qty: it.qty, uid: it.uid })}
                                            onAdd={openAdd} />;
      else if (tab === 'diary') main = <Diary
                                              entriesByDate={entriesByDate}
                                              waterByDate={waterByDate}
                                              selectedDate={selectedDate}
                                              setSelectedDate={setSelectedDate}
                                              setWater={setWater}
                                              onOpenFood={(it) => setFoodDetail({ food: it, meal: it.meal, qty: it.qty, uid: it.uid })} />;
      else if (tab === 'stats') main = <Stats entriesByDate={entriesByDate} waterByDate={waterByDate} />;
      else if (tab === 'profile') main = <Profile onResetData={handleResetData} />;

      return (
        <div className="stage" style={{
          minHeight: '100vh', background: '#E8E6E0',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          padding: 24,
        }}>
          <IOSDevice width={402} height={874}>
            <div style={{ height: '100%', overflow: 'hidden', position: 'relative', background: T.bg }}>
              <div style={{ height: '100%', overflowY: 'auto', paddingTop: 54 }}>
                {main}
              </div>

              {!addingMeal && !scanning && !foodDetail && (
                <TabBar tab={tab} setTab={setTab} onAdd={() => openAdd('Breakfast')} />
              )}

              {addingMeal && (
                <div style={{ position: 'absolute', inset: 0, background: T.bg, zIndex: 100 }}>
                  <AddFood
                    meal={addingMeal}
                    foods={foods}
                    customFoods={customFoods}
                    favorites={favorites}
                    onClose={() => setAddingMeal(null)}
                    onPickFood={handlePickFood}
                    onScan={() => { setAddingMeal(null); setScanning(true); }}
                    onCreateFood={handleCreateCustomFood}
                  />
                </div>
              )}

              {scanning && (
                <div style={{ position: 'absolute', inset: 0, zIndex: 110 }}>
                  <Scanner
                    foods={foods}
                    onClose={() => setScanning(false)}
                    onMatch={(f) => { setScanning(false); setFoodDetail({ food: f, meal: 'Snacks', qty: 1 }); }}
                  />
                </div>
              )}

              {foodDetail && (
                <div style={{ position: 'absolute', inset: 0, zIndex: 120 }}>
                  <FoodDetail
                    food={foodDetail.food}
                    defaultMeal={foodDetail.meal}
                    defaultQty={foodDetail.qty || 1}
                    favorites={favorites}
                    onClose={() => setFoodDetail(null)}
                    onLog={(entry) => handleLog({ ...entry, uid: foodDetail.uid })}
                    onRemove={foodDetail.uid ? () => handleRemoveEntry(foodDetail.uid) : null}
                    onToggleFav={handleToggleFav}
                  />
                </div>
              )}

              <Toast msg={toast} />
            </div>
          </IOSDevice>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
